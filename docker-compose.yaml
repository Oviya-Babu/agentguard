version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - agentguard-net

  opa:
    image: openpolicyagent/opa:latest-static
    container_name: opa
    command: run --server --addr 0.0.0.0:8181 /policies
    ports:
      - "8182:8181"
    volumes:
      - ./policies:/policies
    restart: unless-stopped
    networks:
      - agentguard-net

networks:
  agentguard-net:

volumes:
  redis_data: